  #   webui: "http://192.168.1.100:5055"

# ─── Notifications (Telegram) ────────────────────────────────────────
notifications:
  telegram:
    # Telegram bot token from @BotFather
    bot_token: ""
    # Target chat/group/channel ID (e.g., "-123456789" for group)
    chat_id: ""
    # Optional: topic/thread ID for forum supergroups (leave 0 for main chat)
    message_thread_id: 0
    # Notify on service/Docker recovery (Online/running)
    notify_up: true
    # Notify on service/Docker failure (Offline/exited)
    notify_down: true
    # Minutes between repeat alerts for the same service/container (default: 5)
    cooldown: 5
    # Suppress notifications during certain hours (server local time, 0-23)
    # Example: silent_hours: [23, 0, 1] to silence from 23:00 to 01:59
    silent_hours: []
    # Dry-run mode: log notifications to stdout instead of sending to Telegram
    mock: false

# ─── To-Do List Widget ──────────────────────────────────────────────
todos:
  enabled: false               # Interactive to-do list on dashboard
  file_path: "data/todos.json" # JSON file for persistent storage
  title: "To-Do"               # Widget title

