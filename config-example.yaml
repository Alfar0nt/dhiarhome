proxmox:
  # The URL to your Proxmox VE API (e.g. https://192.168.1.100:8006/api2/json)
  url: "https://192.168.1.100:8006/api2/json"
  # The Node Name you want to monitor (e.g. pve)
  node_name: "pve"
  # API Token ID (e.g. root@pam!dashboard)
  token_id: "root@pam!dashboard"
  # API Token Secret (UUID format)
  token_secret: "YOUR-SECRET-UUID-HERE"
  # Set to true to use mock data for testing UI without real credentials
  mock: true

docker:
  # Path to the local Docker socket
  socket: "unix:///var/run/docker.sock"
  # Containers to explicitly monitor (leave empty to monitor all)
  monitor_containers:
    - "nginx"
    - "pihole"

services:
  # List of web services to monitor for 200 OK
  - name: "Personal Website"
    url: "https://example.com"
  - name: "Nextcloud"
    url: "https://nextcloud.example.com"

# ─── Appearance ───────────────────────────────────────────────────────
appearance:
  # Local file path for background image (relative to working directory)
  background_image: ""
  # Remote URL for background image (overrides background_image if set)
  background_url: ""
  # Dark overlay opacity on the background (0.0 - 1.0)
  background_opacity: 0.3
  # Background blur intensity in pixels (0 - 20)
  background_blur: 5
  # Theme: "dark" (light theme planned for future)
  theme: "dark"
  # Card background opacity (0.0 - 1.0)
  card_opacity: 0.6
  # Card backdrop blur intensity in pixels (0 - 30)
  card_blur: 12
  # Accent color (hex)
  accent_color: "#3b82f6"

# ─── Widgets ──────────────────────────────────────────────────────────
widgets:
  # Weather widget (Open-Meteo API - free, no key required)
  weather:
    enabled: false
    latitude: 40.7128       # Your latitude
    longitude: -74.0060     # Your longitude
    units: "celsius"        # "celsius" or "fahrenheit"
    cache_minutes: 15       # How long to cache API responses
    mock: false             # Use mock data for testing

  # Date/time widget with live client-side clock
  datetime:
    enabled: false
    timezone: "America/New_York"  # IANA timezone (e.g., "Asia/Jakarta", "Europe/London")
    format_24h: false             # true for 24-hour, false for 12-hour AM/PM

  # System info widget (hostname, OS, uptime, Go runtime stats)
  system_info:
    enabled: false

  # Custom text widget (displays arbitrary text)
  custom_text:
    enabled: false
    title: "Note"
    content: "Welcome to dhiarhome!"

# ─── Network Monitoring ──────────────────────────────────────────────
network:
  enabled: false
  show_speed: true            # Show real-time RX/TX speed
  show_total_transfer: true   # Show cumulative total bytes
  update_interval: 3          # Seconds between /proc/net/dev samples
  mock: false                 # Use mock data for testing
  interfaces:
    - name: "eth0"            # Linux interface name (from /proc/net/dev)
      label: "Primary"        # Human-friendly display label
    - name: "wlan0"
      label: "WiFi"

