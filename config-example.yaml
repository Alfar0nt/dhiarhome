proxmox:
  # The URL to your Proxmox VE API (e.g. https://192.168.1.100:8006/api2/json)
  url: "https://192.168.1.100:8006/api2/json"
  # The Node Name you want to monitor (e.g. pve)
  node_name: "pve"
  # API Token ID (e.g. root@pam!dashboard)
  token_id: "root@pam!dashboard"
  # API Token Secret (UUID format)
  token_secret: "YOUR-SECRET-UUID-HERE"
  # Set to true to use mock data for testing UI without real credentials
  mock: true
  # Extra disks to monitor (in addition to disks reported by Proxmox API)
  # Supports two modes:
  #   1. Auto-detect: reads disk usage from local filesystem via statfs
  #      (requires mountpoint to exist on the dashboard host)
  #   2. Manual: specify total/used sizes for remote or unmounted disks
  # Duplicate mountpoints (matching Proxmox API disks) are automatically skipped.
  # Supported size units: B, KB, MB, GB, TB (decimal) or KiB, MiB, GiB, TiB (binary)
  extra_disks:
    # Auto-detect mode: read real usage from local filesystem
    - mountpoint: "/mnt/data"
      auto_detect: true        # reads total/used from statfs (default: true)
    # Manual mode: static values for remote/NAS/unmounted disks
    # - mountpoint: "/mnt/nas"
    #   label: "NAS Storage"   # optional friendly name (defaults to mountpoint)
    #   total: "8TB"           # manual total size
    #   used: "3.2TB"          # manual used size
    #   auto_detect: false     # disable auto-detect when using manual values

docker:
  # ─── Local Docker Socket ────────────────────────────────────────────
  # Path to the local Docker socket (default connection method)
  socket: "unix:///var/run/docker.sock"
  # Containers to explicitly monitor (leave empty to monitor all)
  monitor_containers:
    - "nginx"
    - "pihole"

  # ─── Remote Docker with TLS (optional) ─────────────────────────────
  # For remote Docker daemons over TCP with TLS client certificates.
  # Change socket to tcp:// or https:// and configure certs below.
  #
  # socket: "tcp://docker.example.com:2376"
  # skip_tls: false                     # set true to skip TLS verification (self-signed certs)
  # tls_ca_cert: "/path/to/ca.pem"      # CA certificate (optional with skip_tls)
  # tls_cert: "/path/to/cert.pem"       # client certificate for mTLS
  # tls_key: "/path/to/key.pem"         # client private key for mTLS

  # ─── Portainer API (optional, takes priority over socket/TCP) ─────
  # When configured, containers are fetched via Portainer instead of
  # connecting directly to Docker. Useful for managing remote hosts.
  #
  # portainer_url: "https://portainer.example.com"
  # portainer_api_key: "ptr_XXXXXXXXXXXXXXXXXXXXXXXXXXXX"  # from Portainer > Account > Access tokens
  # portainer_env_id: 1                                     # Portainer environment/endpoint ID (default: 1)

services:
  # List of web services to monitor for 200 OK
  - name: "Personal Website"
    url: "https://example.com"
  - name: "Nextcloud"
    url: "https://nextcloud.example.com"
  - name: "Self-Signed App"
    url: "https://192.168.1.100:8443"
    skip_tls: true          # Skip TLS verification for self-signed certs

# ─── Appearance ───────────────────────────────────────────────────────
appearance:
  # Local file path for background image (relative to working directory)
  background_image: ""
  # Remote URL for background image (overrides background_image if set)
  background_url: ""
  # Dark overlay opacity on the background (0.0 - 1.0)
  background_opacity: 0.3
  # Background blur intensity in pixels (0 - 20)
  background_blur: 5
  # Logo: path to local file (e.g. "static/logo.png") or full URL
  # Used as both favicon (tab icon) and header logo image
  # Leave empty for default inline SVG logo
  logo: "static/logo.png"
  # Theme: "dark" or "light" (user can override via toggle, persisted to localStorage)
  theme: "dark"
  # Card background opacity (0.0 - 1.0)
  card_opacity: 0.6
  # Card backdrop blur intensity in pixels (0 - 30)
  card_blur: 12
  # Accent color (hex)
  accent_color: "#3b82f6"

# ─── Widgets ──────────────────────────────────────────────────────────
widgets:
  # Weather widget (Open-Meteo API - free, no key required)
  weather:
    enabled: false
    latitude: 40.7128       # Your latitude
    longitude: -74.0060     # Your longitude
    units: "celsius"        # "celsius" or "fahrenheit"
    cache_minutes: 15       # How long to cache API responses
    mock: false             # Use mock data for testing

  # Date/time widget with live client-side clock
  datetime:
    enabled: false
    timezone: "America/New_York"  # IANA timezone (e.g., "Asia/Jakarta", "Europe/London")
    format_24h: false             # true for 24-hour, false for 12-hour AM/PM

  # System info widget (hostname, OS, uptime, Go runtime stats)
  system_info:
    enabled: false

  # Custom text widget (displays arbitrary text)
  custom_text:
    enabled: false
    title: "Note"
    content: "Welcome to dhiarhome!"

# ─── Network Monitoring ──────────────────────────────────────────────
network:
  enabled: false
  show_speed: true            # Show real-time RX/TX speed
  show_total_transfer: true   # Show cumulative total bytes
  update_interval: 3          # Seconds between /proc/net/dev samples
  mock: false                 # Use mock data for testing
  interfaces:
    - name: "eth0"            # Linux interface name (from /proc/net/dev)
      label: "Primary"        # Human-friendly display label
    - name: "wlan0"
      label: "WiFi"

# ─── Media Services (Sonarr / Radarr / Overseerr) ────────────────
