<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>dhiarhome</title>
    {{ if .LogoSrc }}
    <link rel="icon" type="{{ if .LogoHasFile }}image/png{{ else }}image/svg+xml{{ end }}" href="{{ .LogoSrc }}">
    {{ else }}
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%233b82f6' stroke-width='2'%3E%3Cpath d='M5 12h14M5 12a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v4a2 2 0 01-2 2M5 12a2 2 0 00-2 2v4a2 2 0 002 2h14a2 2 0 002-2v-4a2 2 0 00-2-2'/%3E%3C/svg%3E">
    {{ end }}

    <!-- Inter Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Tailwind CSS (CDN for lightweight self-hosted deployment) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- HTMX -->
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <script>
    // Custom HTMX swap: DOM diff to update text/attrs in-place.
    // Preserves glass-card elements so backdrop-filter layers aren't destroyed.
    htmx.defineExtension('merge-swap', {
        onEvent: function(name, evt) {
            if (name === 'htmx:beforeSwap') {
                var target = evt.detail.target;
                var newHTML = evt.detail.serverResponse;

                // First load (skeleton): do normal innerHTML swap
                if (!target.querySelector('.glass-card')) {
                    return;
                }

                var temp = document.createElement('div');
                temp.innerHTML = newHTML;
                mergeDOM(target, temp);

                evt.preventDefault();
                return false;
            }
        }
    });

    function mergeDOM(current, incoming) {
        patchChildren(current, incoming);
    }

    function patchChildren(curParent, newParent) {
        var curNodes = Array.from(curParent.childNodes);
        var newNodes = Array.from(newParent.childNodes);

        // Filter out blank text nodes for comparison stability
        var curFiltered = curNodes.filter(function(n) {
            return n.nodeType !== 3 || n.textContent.trim().length > 0;
        });
        var newFiltered = newNodes.filter(function(n) {
            return n.nodeType !== 3 || n.textContent.trim().length > 0;
        });

        var maxLen = Math.max(curFiltered.length, newFiltered.length);

        for (var i = 0; i < maxLen; i++) {
            var cur = curFiltered[i];
            var inc = newFiltered[i];

            if (!cur && inc) {
                // New node: append clone
                curParent.appendChild(inc.cloneNode(true));
                continue;
            }
            if (cur && !inc) {
                // Removed node: remove from DOM
                cur.parentNode.removeChild(cur);
                continue;
            }

            // Both exist: check if same type
            if (cur.nodeType !== inc.nodeType ||
                (cur.nodeType === 1 && cur.tagName !== inc.tagName)) {
                // Structure changed: replace
                cur.parentNode.replaceChild(inc.cloneNode(true), cur);
                continue;
            }

            if (cur.nodeType === 3) {
                // Text node: update value
                if (cur.textContent !== inc.textContent) {
                    cur.textContent = inc.textContent;
                }
                continue;
            }

            // Element node: skip elements marked data-preserve (Alpine.js interactive zones)
            if (cur.nodeType === 1 && cur.hasAttribute && cur.hasAttribute('data-preserve')) {
                continue;
            }

            // Element node: sync dynamic attributes
            syncAttrs(cur, inc);
            syncStyle(cur, inc);
            // Recurse into children
            patchChildren(cur, inc);
        }
    }

    function syncAttrs(cur, inc) {
        // Always sync these dynamic attributes
        var dynamic = ['class', 'style', 'aria-valuenow', 'aria-label', 'role'];
        dynamic.forEach(function(name) {
            var newVal = inc.getAttribute(name);
            var curVal = cur.getAttribute(name);
            if (newVal !== curVal) {
                if (newVal === null) {
                    cur.removeAttribute(name);
                } else {
                    cur.setAttribute(name, newVal);
                }
            }
        });
    }

    function syncStyle(cur, inc) {
        var newStyle = inc.getAttribute('style');
        var curStyle = cur.getAttribute('style');
        if (newStyle !== curStyle) {
            if (newStyle === null) {
                cur.removeAttribute('style');
            } else {
                cur.setAttribute('style', newStyle);
            }
        }
    }
    </script>
    <!-- Alpine.js for interactive todo widget -->
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>

    <style>
        /* ─── CSS Variables ─────────────────────────────────────────── */
        :root {
            --card-bg: rgba(30, 41, 59, {{ printf "%.2f" .CardOpacity }});
            --card-border: rgba(255, 255, 255, 0.1);
            --card-blur: {{ .CardBlur }}px;
            --card-shadow: 0 4px 24px rgba(0, 0, 0, 0.2);
            --card-hover-shadow: 0 8px 32px rgba(59, 130, 246, 0.15);
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --accent-color: {{ .AccentColor }};
            --accent-blue: #3b82f6;
            --accent-green: #10b981;
            --accent-red: #ef4444;
            --accent-purple: #8b5cf6;
            --bg-overlay-opacity: {{ printf "%.2f" .BackgroundOpacity }};
            --bg-blur: {{ .BackgroundBlur }}px;
        }

        /* ─── Base ──────────────────────────────────────────────────── */
        html, body {
            height: 100%;
            overflow: hidden;
        }
        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: #0f172a;
        }
        #scroll-container {
            height: 100dvh;
            overflow-y: auto;
            overflow-x: hidden;
            -webkit-overflow-scrolling: touch;
            /* Firefox scrollbar */
            scrollbar-width: thin;
            scrollbar-color: rgba(255,255,255,0.15) transparent;
        }
        /* WebKit scrollbar (Chrome, Safari, Edge) */
        #scroll-container::-webkit-scrollbar {
            width: 6px;
        }
        #scroll-container::-webkit-scrollbar-track {
            background: transparent;
        }
        #scroll-container::-webkit-scrollbar-thumb {
            background-color: rgba(255,255,255,0.15);
            border-radius: 3px;
        }
        #scroll-container::-webkit-scrollbar-thumb:hover {
            background-color: rgba(255,255,255,0.25);
        }

        /* ─── Glassmorphism Card ────────────────────────────────────── */
        .glass-card {
            background: var(--card-bg);
            backdrop-filter: blur(var(--card-blur));
            -webkit-backdrop-filter: blur(var(--card-blur));
            border: 1px solid var(--card-border);
            border-radius: 1rem;
            box-shadow: var(--card-shadow);
            transition: transform 200ms ease, box-shadow 200ms ease;
            transform: translateZ(0); /* force GPU layer to prevent backdrop-filter flicker */
            will-change: transform;
        }
        .glass-card:hover {
            transform: translateY(-2px) translateZ(0);
            box-shadow: var(--card-hover-shadow);
        }

        /* ─── Glass Inner Panel ─────────────────────────────────────── */
        .glass-inner {
            background: rgba(15, 23, 42, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 0.75rem;
            transition: border-color 200ms ease;
        }
        .glass-inner:hover {
            border-color: rgba(255, 255, 255, 0.15);
        }

        /* ─── Typography ────────────────────────────────────────────── */
        .metric-label {
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--text-secondary);
        }
        .metric-value {
            font-weight: 700;
            letter-spacing: -0.02em;
            color: var(--text-primary);
        }
        h1, h2 { letter-spacing: -0.025em; }

        /* ─── HTMX Transitions ──────────────────────────────────────── */
        .htmx-swapping {
            opacity: 0;
            transition: opacity 180ms ease-out;
        }
        .htmx-settling {
            opacity: 1;
            transition: opacity 250ms ease-in;
        }

        /* ─── Live Indicator Pulse ──────────────────────────────────── */
        @keyframes live-pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .live-dot {
            animation: live-pulse 2s ease-in-out infinite;
        }

        /* ─── Loading Skeleton Shimmer ──────────────────────────────── */
        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }
        .skeleton {
            background: linear-gradient(90deg,
                rgba(30,41,59,0.4) 25%,
                rgba(51,65,85,0.6) 50%,
                rgba(30,41,59,0.4) 75%);
            background-size: 200% 100%;
            animation: shimmer 1.8s ease-in-out infinite;
            border-radius: 0.75rem;
        }

        /* ─── Progress Bar ──────────────────────────────────────────── */
        .progress-bar {
            transition: width 600ms cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* ─── Accessibility: Focus Rings ────────────────────────────── */
        a:focus-visible, button:focus-visible, [tabindex]:focus-visible {
            outline: 2px solid var(--accent-color);
            outline-offset: 2px;
            border-radius: 4px;
        }

        /* ─── Light Theme ───────────────────────────────────────────── */
        .light-theme {
            --card-bg: rgba(255, 255, 255, {{ printf "%.2f" .CardOpacity }});
            --card-border: rgba(0, 0, 0, 0.08);
            --card-shadow: 0 4px 24px rgba(0, 0, 0, 0.06);
            --card-hover-shadow: 0 8px 32px rgba(59, 130, 246, 0.1);
            --text-primary: #1e293b;
            --text-secondary: #64748b;
        }
        .light-theme body {
            background-color: #e2e8f0;
        }
        .light-theme .glass-inner {
            background: rgba(226, 232, 240, 0.7);
            border-color: rgba(0, 0, 0, 0.06);
        }
        .light-theme .glass-inner:hover {
            border-color: rgba(0, 0, 0, 0.12);
        }
        .light-theme #bg-overlay {
            background: rgba(15, 23, 42, 0.15) !important;
        }
        .light-theme #scroll-container {
            scrollbar-color: rgba(0,0,0,0.1) transparent;
        }
        .light-theme #scroll-container::-webkit-scrollbar-thumb {
            background-color: rgba(0,0,0,0.1);
        }
        .light-theme #scroll-container::-webkit-scrollbar-thumb:hover {
            background-color: rgba(0,0,0,0.2);
        }
        .light-theme .text-gray-400 { color: #64748b !important; }
        .light-theme .text-gray-500 { color: #94a3b8 !important; }
        .light-theme .text-white { color: #1e293b !important; }
        .light-theme .text-gray-300 { color: #334155 !important; }
        .light-theme .text-cyan-400 { color: #0891b2 !important; }
        .light-theme .text-blue-400 { color: #2563eb !important; }
        .light-theme .text-green-400 { color: #16a34a !important; }
        .light-theme .text-amber-400 { color: #d97706 !important; }
        .light-theme .text-red-400 { color: #dc2626 !important; }
        .light-theme .text-indigo-400 { color: #6366f1 !important; }
        .light-theme .text-pink-400 { color: #db2777 !important; }
        .light-theme .text-emerald-400 { color: #059669 !important; }
        .light-theme .skeleton { background: rgba(203, 213, 225, 0.5); }
        .light-theme .bg-white\/5 { background: rgba(0, 0, 0, 0.04) !important; }
        .light-theme .bg-white\/10 { background: rgba(0, 0, 0, 0.06) !important; }
        .light-theme .border-white\/10 { border-color: rgba(0, 0, 0, 0.08) !important; }
        .light-theme .border-white\/20 { border-color: rgba(0, 0, 0, 0.12) !important; }
        .light-theme .hover\:border-pink-400\/30:hover { border-color: rgba(219, 39, 119, 0.3) !important; }
        .light-theme .hover\:border-cyan-400\/30:hover { border-color: rgba(8, 145, 178, 0.3) !important; }
        .light-theme .bg-indigo-500\/10 { background: rgba(99, 102, 241, 0.08) !important; }
        .light-theme .border-indigo-400\/20 { border-color: rgba(99, 102, 241, 0.15) !important; }
        .light-theme .glass-inner[role="status"] .text-gray-300 { color: #475569 !important; }
        /* Todo modal light mode override */
        .light-theme .todo-overlay {
            background: rgba(226, 232, 240, 0.95) !important;
        }
        .light-theme .todo-overlay + .relative h2.text-white,
        .light-theme .todo-overlay + .relative .text-white { color: #1e293b !important; }
        .light-theme .todo-overlay + .relative .bg-white\/10 { background: rgba(0, 0, 0, 0.06) !important; }
        .light-theme .todo-overlay + .relative .border-white\/20 { border-color: rgba(0, 0, 0, 0.12) !important; }
        .light-theme .todo-overlay + .relative .bg-white\/\[0\.03\] { background: rgba(0, 0, 0, 0.02) !important; }
        .light-theme .todo-overlay + .relative .border-white\/\[0\.06\] { border-color: rgba(0, 0, 0, 0.06) !important; }
        .light-theme .todo-overlay + .relative .text-gray-500 { color: #94a3b8 !important; }
        .light-theme .todo-overlay + .relative .text-amber-500\/70 { color: rgba(217, 119, 6, 0.7) !important; }
        .light-theme .todo-overlay + .relative .text-gray-400 { color: #64748b !important; }
        .light-theme .todo-overlay + .relative .placeholder-gray-400::placeholder { color: #94a3b8 !important; }
        .light-theme .todo-overlay + .relative .hover\:bg-white\/10:hover { background: rgba(0, 0, 0, 0.06) !important; }
        .light-theme .todo-overlay + .relative .hover\:text-white:hover { color: #1e293b !important; }
        .light-theme .todo-overlay + .relative .text-gray-600 { color: #cbd5e1 !important; }
        .light-theme .todo-overlay + .relative .text-amber-300 { color: #b45309 !important; }
        .light-theme .todo-overlay + .relative .border-amber-400\/30 { border-color: rgba(217, 119, 6, 0.4) !important; }

        /* ─── Reduced Motion ────────────────────────────────────────── */
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
            .glass-card:hover { transform: none; }
        }
    </style>
</head>
<body class="text-gray-100 antialiased">

    {{ if .BackgroundSrc }}
    <div id="bg-image" aria-hidden="true" style="position: fixed; inset: 0; z-index: -2; background-image: url('{{ .BackgroundSrc }}'); background-size: cover; background-position: center; background-repeat: no-repeat; filter: blur(var(--bg-blur)); transform: scale(1.05); pointer-events: none;"></div>
    <div id="bg-overlay" aria-hidden="true" style="position: fixed; inset: 0; z-index: -1; background: rgba(15, 23, 42, var(--bg-overlay-opacity)); pointer-events: none;"></div>
    {{ end }}

    <div id="scroll-container" class="p-4 md:p-8">
    <div class="max-w-6xl mx-auto md:max-w-none">

        <!-- Header -->
        <header class="mb-8 flex items-center justify-between">
            <div>
                <h1 class="text-3xl font-extrabold tracking-tight text-white sm:text-4xl flex items-center gap-3">
                    {{ if .LogoSrc }}
                    <img src="{{ .LogoSrc }}" alt="Logo" class="w-8 h-8 sm:w-10 sm:h-10 object-contain">
                    {{ else }}
                    <svg class="w-8 h-8 sm:w-10 sm:h-10" fill="none" stroke="var(--accent-color)" stroke-width="2" viewBox="0 0 24 24" aria-hidden="true">
                        <path d="M5 12h14M5 12a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v4a2 2 0 01-2 2M5 12a2 2 0 00-2 2v4a2 2 0 002 2h14a2 2 0 002-2v-4a2 2 0 00-2-2"/>
                    </svg>
                    {{ end }}
                    <span>dhiar<span style="color: var(--accent-color)">home</span></span>
                </h1>
                <p class="mt-2 text-sm text-gray-400 tracking-normal">Lightweight homelab monitoring dashboard</p>
            </div>

            <div class="flex items-center space-x-3">
                <button id="theme-toggle" type="button" class="glass-inner px-3 py-1.5 rounded-full flex items-center space-x-1.5 cursor-pointer hover:border-white/20 transition-colors" aria-label="Toggle theme" title="Toggle theme">
                    <svg id="theme-icon-sun" class="w-4 h-4 text-yellow-400" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true" style="display:none">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/>
                    </svg>
                    <svg id="theme-icon-moon" class="w-4 h-4 text-blue-300" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/>
                    </svg>
                    <span id="theme-label" class="text-xs font-medium text-gray-400">Light</span>
                </button>
                <div class="flex items-center space-x-2 px-3 py-1.5 rounded-full glass-inner" role="status" aria-label="Dashboard is live, data refreshes every 5 seconds">
                    <span class="relative flex h-3 w-3" aria-hidden="true">
                        <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span>
                        <span class="live-dot relative inline-flex rounded-full h-3 w-3 bg-green-500"></span>
                    </span>
                    <span class="text-sm font-medium text-gray-300">Live</span>
                </div>
            </div>
        </header>

        <!-- Main Dashboard Container - Polls every 5s -->
        <div
            hx-get="/status"
            hx-trigger="load, every 5s"
            hx-swap="innerHTML transition:true" hx-ext="merge-swap"
            id="dashboard-content"
            aria-live="polite"
            aria-label="Dashboard metrics and service status"
        >
            <!-- Initial Loading Skeleton -->
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6" role="status" aria-label="Loading dashboard data">
                <div class="skeleton h-52 col-span-1 md:col-span-3"></div>
                <div class="skeleton h-64 col-span-1 md:col-span-2"></div>
                <div class="skeleton h-64 col-span-1"></div>
                <span class="sr-only">Connecting to aggregator…</span>
            </div>
        </div>

    </div>
    </div>

    <script>
    (function() {
        var theme = localStorage.getItem('dhiarhome-theme') || '{{ .Theme }}';
        var html = document.documentElement;
        var sunIcon = document.getElementById('theme-icon-sun');
        var moonIcon = document.getElementById('theme-icon-moon');
        var label = document.getElementById('theme-label');

        function applyTheme(t) {
            if (t === 'light') {
                html.classList.add('light-theme');
                sunIcon.style.display = '';
                moonIcon.style.display = 'none';
                label.textContent = 'Dark';
            } else {
                html.classList.remove('light-theme');
                sunIcon.style.display = 'none';
                moonIcon.style.display = '';
                label.textContent = 'Light';
            }
            localStorage.setItem('dhiarhome-theme', t);
        }

        applyTheme(theme);

        document.getElementById('theme-toggle').addEventListener('click', function() {
            var current = localStorage.getItem('dhiarhome-theme') || '{{ .Theme }}';
            applyTheme(current === 'dark' ? 'light' : 'dark');
        });
    })();
    </script>

</body>
</html>
